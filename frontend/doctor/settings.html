<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account Settings — Doctor Portal</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
  <div class="video-background"><video autoplay muted loop playsinline><source src="/BG.mp4" type="video/mp4"></video></div>
  <div class="video-overlay"></div>
  <div class="page-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">🩺</div>
        <div><div class="logo-text">MedAnnotate</div><div class="logo-sub">Doctor Portal</div></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="/doctor/dashboard" class="nav-item"><i class="fa fa-gauge"></i> Dashboard</a>
        <a href="/doctor/dashboard#queue" class="nav-item"><i class="fa fa-images"></i> Image Queue</a>
        <a href="/doctor/earnings" class="nav-item"><i class="fa fa-dollar-sign"></i> Earnings & History</a>
        <a href="/doctor/wallet" class="nav-item"><i class="fa fa-wallet"></i> My Wallet</a>
        <div class="nav-section-label">Account</div>
        <a href="/doctor/profile" class="nav-item"><i class="fa fa-user"></i> My Profile</a>
        <a href="/doctor/settings" class="nav-item active"><i class="fa fa-gear"></i> Account Settings</a>
        <a href="/doctor/help" class="nav-item"><i class="fa fa-circle-question"></i> Help & Feedback</a>
      </nav>
      <div class="sidebar-footer">
        <button class="logout-btn" onclick="logout()"><i class="fa fa-right-from-bracket"></i> Sign Out</button>
      </div>
    </aside>

    <header class="navbar">
      <div class="navbar-left">
        <div><div class="page-title">Settings</div><div class="page-subtitle">Security and preferences</div></div>
      </div>
    </header>

    <main class="main-content">
      <div class="card" style="max-width:600px">
        <h3><i class="fa fa-shield"></i> Security</h3>
        <div class="form-group" style="margin-top:24px">
          <label class="form-label">Current Password</label>
          <input type="password" class="form-input" placeholder="••••••••" />
        </div>
        <div class="form-group"><label class="form-label">New Password</label><input type="password" class="form-input" /></div>
        <button class="btn btn-primary">Update Password</button>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script>document.addEventListener('DOMContentLoaded', () => { requireAuth(['doctor']); });</script>
</body>
</html>
