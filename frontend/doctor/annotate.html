<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annotate Image — MedAnnotate</title>
  <link rel="stylesheet" href="/css/main.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <style>
    body {
      overflow: hidden;
    }

    .annotate-layout {
      display: flex;
      height: 100vh;
      flex-direction: column;
    }

    .annotate-topbar {
      height: 56px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      flex-shrink: 0;
      z-index: 10;
    }

    .annotate-body {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .tool-panel {
      width: 56px;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 12px 8px;
      gap: 6px;
      flex-shrink: 0;
    }

    .tool-btn {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.95rem;
      transition: var(--transition);
      flex-shrink: 0;
    }

    .tool-btn:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .tool-btn.active {
      background: var(--cyan-dim);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .tool-sep {
      width: 32px;
      height: 1px;
      background: var(--border);
      margin: 4px 0;
    }

    .canvas-area {
      flex: 1;
      background: #070c16;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: auto;
      position: relative;
    }

    #canvas-wrapper {
      position: relative;
    }

    .info-panel {
      width: 280px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      flex-shrink: 0;
    }

    .info-section {
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }

    .info-section h4 {
      font-size: 0.8rem;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .ann-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 6px;
      font-size: 0.8rem;
    }

    .ann-chip .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .label-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .label-chip {
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      border: 1px solid var(--border);
      background: var(--bg-card);
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
    }

    .label-chip:hover {
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .label-chip.selected {
      background: var(--cyan-dim);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    .confidence-display {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--cyan);
    }
  </style>
</head>

<body>
  <div class="annotate-layout">

    <!-- TOP BAR -->
    <div class="annotate-topbar">
      <div style="display:flex;align-items:center;gap:16px;">
        <a href="/doctor/dashboard"
          style="color:var(--text-secondary);font-size:0.875rem;display:flex;align-items:center;gap:6px;"><i
            class="fa fa-arrow-left"></i> Back</a>
        <div style="width:1px;height:20px;background:var(--border);"></div>
        <span style="font-size:0.875rem;"><span style="color:var(--text-secondary);">Annotating</span> <span
            id="top-filename" style="font-weight:600;">Loading...</span></span>
        <span class="badge badge-cyan" id="top-dept">—</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <!-- Live timer -->
        <div
          style="display:flex;align-items:center;gap:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:4px 12px;">
          <i class="fa fa-clock" style="color:var(--text-muted);font-size:0.75rem"></i>
          <span id="timer"
            style="font-family:monospace;font-size:0.85rem;color:var(--cyan);font-weight:700">00:00</span>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="saveDraft()"><i class="fa fa-floppy-disk"></i> Save Draft</button>
        <button class="btn btn-primary btn-sm" onclick="submitAnnotation()"><i class="fa fa-paper-plane"></i> Submit for
          Review</button>
      </div>
    </div>

    <div class="annotate-body">

      <!-- TOOL PANEL -->
      <div class="tool-panel">
        <button class="tool-btn active" id="tool-select" onclick="setTool('select')" title="Select"><i
            class="fa fa-arrow-pointer"></i></button>
        <button class="tool-btn" id="tool-rect" onclick="setTool('rect')" title="Bounding Box"><i
            class="fa fa-vector-square"></i></button>
        <button class="tool-btn" id="tool-draw" onclick="setTool('draw')" title="Freehand Draw"><i
            class="fa fa-pen-nib"></i></button>
        <div class="tool-sep"></div>
        <button class="tool-btn" onclick="undoAction()" title="Undo"><i class="fa fa-rotate-left"></i></button>
        <button class="tool-btn" onclick="redoAction()" title="Redo"><i class="fa fa-rotate-right"></i></button>
        <button class="tool-btn" onclick="deleteSelected()" title="Delete Selected" style="color:var(--red);"><i
            class="fa fa-trash"></i></button>
        <div class="tool-sep"></div>
        <button class="tool-btn" onclick="zoomIn()" title="Zoom In"><i class="fa fa-magnifying-glass-plus"></i></button>
        <button class="tool-btn" onclick="zoomOut()" title="Zoom Out"><i
            class="fa fa-magnifying-glass-minus"></i></button>
        <button class="tool-btn" onclick="resetZoom()" title="Fit to Screen"><i class="fa fa-expand"></i></button>
        <div class="tool-sep"></div>
        <button class="tool-btn" onclick="clearAll()" title="Clear All" style="color:var(--red);"><i
            class="fa fa-ban"></i></button>
        <!-- Color picker -->
        <div class="tool-sep"></div>
        <div title="Annotation Color" style="position:relative;">
          <input type="color" id="color-picker" value="#00d4ff"
            style="width:32px;height:32px;border-radius:8px;border:1px solid var(--border);cursor:pointer;padding:2px;background:none;" />
        </div>
      </div>

      <!-- CANVAS AREA -->
      <div class="canvas-area" id="canvas-area">
        <div id="canvas-wrapper">
          <canvas id="annotation-canvas"></canvas>
        </div>
        <div id="canvas-loading"
          style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:rgba(7,12,22,0.8);flex-direction:column;gap:12px;">
          <div class="spinner" style="width:40px;height:40px;border-width:3px;"></div>
          <div style="color:var(--text-secondary);">Loading image...</div>
        </div>
      </div>

      <!-- INFO PANEL -->
      <div class="info-panel">
        <div class="info-section">
          <h4><i class="fa fa-circle-info"></i> Image Info</h4>
          <div style="font-size:0.8rem;display:flex;flex-direction:column;gap:6px;">
            <div style="display:flex;justify-content:space-between;"><span style="color:var(--text-muted);">Image
                ID</span><span id="info-id" style="font-family:monospace;font-size:0.75rem;">—</span></div>
            <div style="display:flex;justify-content:space-between;"><span
                style="color:var(--text-muted);">Department</span><span id="info-dept">—</span></div>
            <div style="display:flex;justify-content:space-between;"><span
                style="color:var(--text-muted);">Status</span><span id="info-status">—</span></div>
            <div style="display:flex;justify-content:space-between;"><span
                style="color:var(--text-muted);">Anonymized</span><span style="color:var(--green);">✓ Yes</span></div>
          </div>
        </div>

        <div class="info-section">
          <h4><i class="fa fa-tags"></i> Annotations (<span id="ann-count">0</span>)</h4>
          <div id="annotations-list">
            <p style="font-size:0.8rem;">Draw on the image to add annotations.</p>
          </div>
        </div>

        <div class="info-section">
          <h4><i class="fa fa-tag"></i> Add Label</h4>
          <div class="label-grid" id="label-grid">
            <div class="label-chip selected" onclick="selectLabel(this, 'Anomaly')" data-label="Anomaly">Anomaly</div>
            <div class="label-chip" onclick="selectLabel(this, 'Normal')" data-label="Normal">Normal</div>
          </div>
          <input type="text" class="form-input" id="custom-label" placeholder="Custom label..."
            style="margin-top:8px;font-size:0.8rem;" onkeydown="if(event.key==='Enter')addCustomLabel()" />
        </div>

        <div class="info-section">
          <h4><i class="fa fa-note-sticky"></i> Clinical Notes</h4>
          <textarea class="form-textarea" id="notes" placeholder="Add clinical observations..."
            style="min-height:70px;font-size:0.8rem;" rows="3"></textarea>
        </div>

        <div class="info-section">
          <h4><i class="fa fa-gauge-high"></i> Confidence Level</h4>
          <div style="display:flex;align-items:center;gap:10px;">
            <input type="range" id="confidence" min="0" max="100" value="80" style="flex:1;accent-color:var(--cyan);"
              oninput="document.getElementById('conf-val').textContent=this.value+'%'" />
            <span class="confidence-display" id="conf-val">80%</span>
          </div>
        </div>

        <div style="padding:16px;display:flex;flex-direction:column;gap:8px;margin-top:auto;">
          <button class="btn btn-primary" style="justify-content:center;" onclick="submitAnnotation()"><i
              class="fa fa-paper-plane"></i> Submit for QA Review</button>
          <button class="btn btn-ghost" style="justify-content:center;" onclick="saveDraft()"><i
              class="fa fa-floppy-disk"></i> Save Draft</button>
        </div>
      </div>

    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/annotate.js"></script>
</body>

</html>
